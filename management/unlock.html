<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>System Access</title>

<style>
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 320px;
    background: #ffffff;
    border-radius: 10px;
    padding: 22px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    text-align: center;
  }
  h2 {
    margin-top: 0;
    color: #333;
  }
  input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    font-size: 16px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
  }
  button:active {
    transform: scale(0.98);
  }
  #msg {
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>

<body>
  <div class="card">
    <h2>System Access</h2>
    <input id="key" type="password" placeholder="Access key" autofocus />
    <button onclick="unlock()">Unlock</button>
    <div id="msg"></div>
  </div>

<script>
async function unlock() {
  const key = document.getElementById('key').value.trim();
  const msg = document.getElementById('msg');

  msg.textContent = 'Checking...';

  try {
    const r = await fetch('/api/manage-unlock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key })
    });

    if (r.ok) {
      msg.style.color = 'green';
      msg.textContent = 'Access granted';
      setTimeout(() => location.href = '/manage', 600);
    } else {
      msg.style.color = 'red';
      msg.textContent = 'Invalid key';
    }
  } catch (e) {
    msg.style.color = 'red';
    msg.textContent = 'Network error';
  }
}
</script>
</body>
</html>
